name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PUBLIC_API_URL: https://consumer-product-recalls-api.fly.dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # The lockfile is generated with npm 11 (dev default). Node 22 ships npm 10,
      # which resolves the @emnapi optional wasm deps (under rolldown) differently
      # and breaks `npm ci`; pin npm 11 so CI matches the committed lockfile.
      - run: npm install -g npm@11

      - run: npm ci

      - name: Regenerate API types and fail on contract drift
        run: |
          # FastAPI serves compact JSON; normalize to the committed pretty form
          # (indent=2, ensure_ascii=False, trailing newline) so the diff reflects
          # real spec changes, not formatting. Keep openapi.json and
          # public/openapi.json (the Scalar /api source) in sync.
          curl -sSf "$PUBLIC_API_URL/openapi.json" \
            | python3 -c "import json,sys; json.dump(json.load(sys.stdin), sys.stdout, indent=2, ensure_ascii=False)" > openapi.json
          printf '\n' >> openapi.json
          cp openapi.json public/openapi.json
          npm run gen:api
          if ! git diff --exit-code openapi.json public/openapi.json src/lib/api/schema.d.ts; then
            echo "::error::API contract drift — the deployed spec differs from the committed copy. Re-sync: curl the spec, format (indent=2, ensure_ascii=False), npm run gen:api, then commit openapi.json + public/openapi.json + schema.d.ts."
            exit 1
          fi

      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npm run test:e2e
